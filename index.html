<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard MCP — Control Planilla & Quincena</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ══════════════════════════════════════════════════════
       NAVBAR
  ══════════════════════════════════════════════════════ -->
  <nav class="bg-blue-700 shadow-lg sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex justify-between items-center h-16">

        <!-- Logo -->
        <div class="flex items-center gap-3">
          <i class="fas fa-clipboard-check text-white text-2xl"></i>
          <div>
            <span class="text-white font-bold text-lg leading-none">Dashboard MCP</span>
            <span class="hidden sm:block text-blue-200 text-xs">Control Planilla &amp; Quincena</span>
          </div>
        </div>

        <!-- Menú escritorio -->
        <div class="hidden md:flex items-center gap-1">
          <button onclick="App.navigate('dashboard')"   id="nav-dashboard"   class="nav-btn active">
            <i class="fas fa-tachometer-alt mr-2"></i>Dashboard
          </button>
          <button onclick="App.navigate('actividades')" id="nav-actividades" class="nav-btn">
            <i class="fas fa-tasks mr-2"></i>Actividades
          </button>
          <button onclick="App.navigate('contactos')"   id="nav-contactos"   class="nav-btn">
            <i class="fas fa-address-book mr-2"></i>Contactos
          </button>
        </div>

        <!-- Botón hamburguesa (móvil) -->
        <button id="menu-toggle" onclick="App.toggleMenu()"
          class="md:hidden text-white p-2 rounded-lg hover:bg-blue-600 transition-colors"
          aria-label="Menú">
          <i class="fas fa-bars text-xl"></i>
        </button>
      </div>

      <!-- Menú móvil desplegable -->
      <div id="mobile-menu" class="hidden md:hidden pb-3 border-t border-blue-600 mt-1 pt-2">
        <button onclick="App.navigate('dashboard')"   id="nav-m-dashboard"   class="mobile-nav-btn active">
          <i class="fas fa-tachometer-alt mr-3"></i>Dashboard
        </button>
        <button onclick="App.navigate('actividades')" id="nav-m-actividades" class="mobile-nav-btn">
          <i class="fas fa-tasks mr-3"></i>Actividades
        </button>
        <button onclick="App.navigate('contactos')"   id="nav-m-contactos"   class="mobile-nav-btn">
          <i class="fas fa-address-book mr-3"></i>Contactos
        </button>
      </div>
    </div>
  </nav>

  <!-- ══════════════════════════════════════════════════════
       CONTENIDO PRINCIPAL
  ══════════════════════════════════════════════════════ -->
  <main class="max-w-7xl mx-auto px-4 py-6">

    <!-- ╔═══════════════════════╗
         ║  VISTA DASHBOARD      ║
         ╚═══════════════════════╝ -->
    <div id="view-dashboard" class="view">

      <!-- Encabezado -->
      <div class="mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Dashboard</h2>
        <p class="text-sm text-gray-500 mt-0.5">Resumen general de actividades de planilla y quincena</p>
      </div>

      <!-- Tarjetas estadísticas -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6" id="dashboard-cards">
        <!-- Se renderizan desde JS -->
      </div>

      <!-- Próximas fechas + Alertas -->
      <div class="grid md:grid-cols-2 gap-6">

        <div class="bg-white rounded-xl shadow p-5">
          <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
            <i class="fas fa-calendar-alt text-blue-500"></i>
            Próximas Fechas de Entrega
            <span class="text-xs text-gray-400 font-normal ml-auto">próximos 14 días</span>
          </h3>
          <div id="upcoming-list"></div>
        </div>

        <div class="bg-white rounded-xl shadow p-5">
          <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
            <i class="fas fa-exclamation-triangle text-yellow-500"></i>
            Alertas de Fechas
          </h3>
          <div id="alerts-list"></div>
        </div>

      </div>
    </div>

    <!-- ╔═══════════════════════╗
         ║  VISTA ACTIVIDADES    ║
         ╚═══════════════════════╝ -->
    <div id="view-actividades" class="view hidden">

      <!-- Cabecera + controles -->
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-5">
        <div>
          <h2 class="text-2xl font-bold text-gray-800">Actividades</h2>
          <p class="text-sm text-gray-500 mt-0.5">Checklist de tareas de planilla y quincena</p>
        </div>
        <div class="flex flex-wrap gap-2 w-full sm:w-auto">
          <select id="filter-tipo" onchange="UI.renderActividades()" class="filter-select">
            <option value="">Todos los tipos</option>
            <option value="planilla">Planilla</option>
            <option value="quincena1">1ra Quincena</option>
            <option value="quincena2">2da Quincena</option>
          </select>
          <select id="filter-estado" onchange="UI.renderActividades()" class="filter-select">
            <option value="">Todos los estados</option>
            <option value="pendiente">Pendiente</option>
            <option value="en_proceso">En Proceso</option>
            <option value="completado">Completado</option>
          </select>
          <button onclick="App.openModal('actividad')" class="btn-primary">
            <i class="fas fa-plus mr-2"></i>Nueva
          </button>
          <button onclick="App.exportCSV()" class="btn-secondary" title="Exportar a CSV">
            <i class="fas fa-file-csv mr-1"></i>
            <span class="hidden sm:inline">Exportar</span>
          </button>
        </div>
      </div>

      <!-- Contenedor (tabla escritorio / tarjetas móvil) -->
      <div id="actividades-container"></div>
    </div>

    <!-- ╔═══════════════════════╗
         ║  VISTA CONTACTOS      ║
         ╚═══════════════════════╝ -->
    <div id="view-contactos" class="view hidden">

      <div class="flex justify-between items-center mb-5">
        <div>
          <h2 class="text-2xl font-bold text-gray-800">Contactos</h2>
          <p class="text-sm text-gray-500 mt-0.5">Personas y correos de envío de información</p>
        </div>
        <button onclick="App.openModal('contacto')" class="btn-primary">
          <i class="fas fa-user-plus mr-2"></i>Nuevo Contacto
        </button>
      </div>

      <div id="contactos-container" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </div>

  </main>

  <!-- ══════════════════════════════════════════════════════
       MODAL
  ══════════════════════════════════════════════════════ -->
  <div id="modal" class="hidden" onclick="App.closeModalOutside(event)">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[92vh] overflow-y-auto">
      <div class="flex justify-between items-center px-6 py-4 border-b">
        <h3 id="modal-title" class="text-lg font-bold text-gray-800"></h3>
        <button onclick="App.closeModal()"
          class="text-gray-400 hover:text-gray-600 transition-colors p-1 rounded-lg hover:bg-gray-100"
          aria-label="Cerrar">
          <i class="fas fa-times text-lg"></i>
        </button>
      </div>
      <div id="modal-body" class="px-6 py-5"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       TOAST
  ══════════════════════════════════════════════════════ -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- ══════════════════════════════════════════════════════
       SCRIPTS (orden importante)
  ══════════════════════════════════════════════════════ -->
  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
