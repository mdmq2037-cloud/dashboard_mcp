<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RRHH Sistema — Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      overflow: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(59,130,246,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(16,185,129,0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    .container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 440px;
      padding: 24px 20px;
    }

    /* Logo */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .logo-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #2563eb, #10b981);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(37,99,235,0.5), 0 8px 24px rgba(0,0,0,0.4);
    }
    .logo-icon svg { width: 38px; height: 38px; color: white; }
    .logo-title {
      font-size: 22px; font-weight: 800; letter-spacing: 1px;
      background: linear-gradient(90deg, #60a5fa, #34d399);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-sub {
      font-size: 12px; color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase;
    }

    /* Card */
    .card {
      background: rgba(15,23,42,0.85);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 36px 32px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
    }

    .card h2 {
      text-align: center; color: #f1f5f9;
      font-size: 20px; font-weight: 700; margin-bottom: 8px;
    }
    .card p { text-align: center; color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 28px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; color: rgba(255,255,255,0.6); font-size: 12px; font-weight: 600; margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }

    .input-wrap { position: relative; }
    .input-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: rgba(255,255,255,0.3); }

    .field input {
      width: 100%; padding: 13px 16px 13px 42px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; color: #f1f5f9;
      font-size: 14px; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input::placeholder { color: rgba(255,255,255,0.25); }
    .field input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }

    .error {
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px; color: #fca5a5; font-size: 13px;
      padding: 10px 14px; margin-bottom: 16px; text-align: center;
    }

    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border: none; border-radius: 10px; color: #fff;
      font-size: 15px; font-weight: 700; letter-spacing: 1px;
      cursor: pointer; transition: transform 0.1s, box-shadow 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(37,99,235,0.5); }
    .btn:active { transform: translateY(0); }

    .hint {
      margin-top: 16px; padding: 10px 14px;
      background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2);
      border-radius: 8px; color: rgba(52,211,153,0.8);
      font-size: 12px; text-align: center;
    }

    .footer { color: rgba(255,255,255,0.3); font-size: 12px; text-align: center; }

    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <div class="logo-title">RRHH Sistema</div>
      <div class="logo-sub">Recursos Humanos &amp; Nómina</div>
    </div>

    <div class="card">
      <h2>Bienvenido</h2>
      <p>Ingresa tus credenciales para continuar</p>

      {% if error %}
      <div class="error">
        <svg style="width:14px;height:14px;display:inline;margin-right:4px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="field">
          <label>Usuario</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" name="username" placeholder="Nombre de usuario" required autocomplete="username">
          </div>
        </div>
        <div class="field">
          <label>Contraseña</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>
        <button type="submit" class="btn">
          <svg style="width:18px;height:18px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          INGRESAR AL SISTEMA
        </button>
      </form>

      <div class="hint">Demo: usuario <strong>admin</strong> · contraseña <strong>rrhh2024</strong></div>
    </div>

    <div class="footer">© 2024 Sistema RRHH — Todos los derechos reservados</div>
  </div>
</body>
</html>
